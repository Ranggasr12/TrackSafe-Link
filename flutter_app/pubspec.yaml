name: tracksafe_app
description: TrackSafe Link - Early Warning System Kereta Api (incremental skripsi).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # TAHAP 1
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  fl_chart: ^0.69.2
  cupertino_icons: ^1.0.8
  firebase_core: ^4.12.1
  firebase_database: ^12.4.6

  # Sprint 11 — Local Notification
  flutter_local_notifications: ^18.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.2
  audioplayers: ^6.8.1

  # Sprint berikutnya
  # http: ^1.2.2
  # connectivity_plus: ^6.1.0
  # audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
